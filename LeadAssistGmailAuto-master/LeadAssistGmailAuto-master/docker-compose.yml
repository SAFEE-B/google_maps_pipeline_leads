version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: naqvi-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    networks:
      - naqvi-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: naqvi-ai-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - naqvi-ai-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  naqvi-ai-network:
    driver: bridge 